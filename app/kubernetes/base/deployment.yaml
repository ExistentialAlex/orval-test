---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orval-test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orval-test-app
  template:
    metadata:
      annotations:
      labels:
        app: orval-test-app
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: orval-test
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: orval-test-app
      volumes:
        - name: orval-test-config-volume
          configMap:
            name: orval-test-configmap
      containers:
        - name: orval-test-app
          image: europe-west1-docker.pkg.dev/uk-cti-adtech-platform-test/orval-test/orval-test-app:${GIT_TAG}
          imagePullPolicy: Always
          ports:
            - name: app
              containerPort: 80
          volumeMounts:
            - name: orval-test-config-volume
              mountPath: /usr/share/nginx/html/config.json
              subPath: config.json
          resources:
            limits:
              memory: 500Mi
              cpu: 500m
            requests:
              memory: 100Mi
              cpu: 100m
